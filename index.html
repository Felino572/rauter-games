<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RAUTER GAMES - Panel</title>
<style>
body{margin:0;background:#0f0f0f;color:white;font-family:Arial,sans-serif}
.header{display:flex;align-items:center;justify-content:center;gap:15px;padding:20px;background:#1a1a1a;border-bottom:2px solid #ff6a00}
.header img{width:70px;height:70px;border-radius:50%;border:3px solid #ff6a00;object-fit:cover}
.card{background:#1e1e1e;margin:20px;padding:20px;border-radius:15px;border:1px solid #333;text-align:center}
.status{color:#ff6a00;font-weight:bold}
</style>
</head>
<body>
<div class="header">
<img src="logo.png" alt="Rauter Games">
<h1 style="margin:0">RAUTER GAMES</h1>
</div>
<div class="card">
<h2>🐺 Panel Maestro</h2>
<p>1 Cliente Activo</p>
<h3>Bar La Cumbre</h3>
<p class="status" id="status">Conectando a Supabase...</p>
<p id="count">Cargando...</p>
</div>
<script>
const url='https://cxocgsfcbbzstuqxvezi.supabase.co/rest/v1/pulsos_caliz?select=*';
const key='sb_publishable_Aa3Ns7pT3kL-6Usn8a-Icw_4Q35wD7a';
async function cargar(){
 try{
  let r=await fetch(url,{headers:{apikey:key,Authorization:'Bearer '+key}});
  let d=await r.json();
  document.getElementById('status').innerText='✅ Conectado: Supabase OK';
  document.getElementById('count').innerText=d.length+' pulsos recibidos';
 }catch(e){
  document.getElementById('status').innerText='❌ Error de conexión';
 }
}
setInterval(cargar,3000);cargar();
</script>
</body>
</html>
