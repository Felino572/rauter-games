<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RAUTER GAMES - V2.3</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{background:#0f0f0f;color:white;font-family:Arial}</style>
</head>
<body class="p-4">
<h1 class="text-2xl font-bold text-orange-500">🐺 RAUTER GAMES - DASHBOARD V2.3</h1>
<p class="text-sm text-zinc-400 mb-4">62 TIENDAS | 187 MÁQUINAS | <span id="online">143 ONLINE</span> | $42,380 HOY</p>

<div class="flex gap-4">
  <!-- IZQUIERDA LISTA TIENDAS -->
  <div class="w-1/3 bg-black border border-orange-500/30 rounded p-2 h-[80vh] overflow-auto">
    <h2 class="font-bold mb-2">Tiendas</h2>
    <div id="locationsList"></div>
  </div>

  <!-- DERECHA DETALLE -->
  <div class="w-2/3 bg-zinc-900 rounded p-4">
    <h2 id="locName" class="text-xl font-bold">Selecciona una tienda</h2>
    <p id="locInfo" class="text-zinc-400 text-sm mb-4">GDL - Hoy: $0</p>
    <div id="machinesList" class="grid grid-cols-2 gap-3"></div>
    <canvas id="chart" class="mt-6 w-full h-32 bg-black rounded"></canvas>
  </div>
</div>

<!-- MODAL CONFIG -->
<div id="configModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
  <div class="bg-zinc-900 p-6 rounded border border-orange-500">
    <h3 class="font-bold">Configurar <span id="cfgMachine"></span></h3>
    <p class="mt-2">M1: $<input id="valM1" type="number" value="5" class="w-16 text-black p-1">
       M2: $<input id="valM2" type="number" value="10" class="w-16 text-black p-1"></p>
    <p class="mt-2">Billetero: $<input id="valBill" type="number" value="20" class="w-16 text-black p-1"></p>
    <div class="mt-4 flex gap-2">
      <button onclick="guardarConfig()" class="bg-orange-500 text-black px-4 py-2 rounded font-bold">GUARDAR</button>
      <button onclick="closeConfig()" class="bg-zinc-700 px-4 py-2 rounded">CERRAR</button>
    </div>
  </div>
</div>

<!-- MODAL MOVER -->
<div id="moveModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
  <div class="bg-zinc-900 p-6 rounded border border-orange-500">
    <h3 class="font-bold">Mover Máquina <span id="moveMachineId"></span></h3>
    <p class="mt-2">Destino: <input id="moveDestino" type="text" placeholder="Ej: Abarrotes Lupita" class="text-black p-1 w-64"></p>
    <div class="mt-4 flex gap-2">
      <button onclick="confirmMove()" class="bg-green-500 text-black px-4 py-2 rounded font-bold">CONFIRMAR MOVIMIENTO</button>
      <button onclick="closeMove()" class="bg-zinc-700 px-4 py-2 rounded">CANCELAR</button>
    </div>
  </div>
</div>

<script>
// DATOS CON ALERTA 6h-12h YA INTEGRADA
const locs=[
 {name:"Papeleria Juanita",city:"GDL",mqs:2,hoy:380,ultimo:new Date()},
 {name:"Abarrotes Lupita",city:"GDL",mqs:1,hoy:120,ultimo:new Date(Date.now()-7*3600000)},
 {name:"Tienda La Esquina",city:"GDL",mqs:3,hoy:450,ultimo:new Date()},
 {name:"Farmacia San Jose",city:"GDL",mqs:2,hoy:200,ultimo:new Date(Date.now()-13*3600000)},
 {name:"Ciber Cybermax",city:"GDL",mqs:5,hoy:1120,ultimo:new Date()},
 {name:"Tendejon Don Chuy",city:"GDL",mqs:2,hoy:210,ultimo:new Date(Date.now()-15*3600000)},
 {name:"Bar La Cumbre",city:"GDL",mqs:1,hoy:340,ultimo:new Date()}
];

let sel = 0;

function getAlerta(ultimo){
  let horas = (new Date() - ultimo)/1000/3600;
  if(horas>=12) return `<span class="bg-red-600 text-white px-2 py-0.5 rounded text-[10px]">🔴 APAGADA ${horas.toFixed(1)}h</span>`;
  if(horas>=6) return `<span class="bg-orange-500 text-black px-2 py-0.5 rounded text-[10px]">⚠️ ${horas.toFixed(1)}h SIN REPORTE</span>`;
  return `<span class="bg-green-600 text-white px-2 py-0.5 rounded text-[10px]">🟢 OK</span>`;
}

function renderLocs(){
  const list=document.getElementById('locationsList');
  list.innerHTML=locs.map((l,i)=>`
    <div onclick="selectLoc(${i})" class="p-3 mb-2 bg-zinc-800 rounded cursor-pointer hover:bg-zinc-700 border ${sel==i?'border-orange-500':'border-transparent'}">
      <div class="flex justify-between"><b class="text-sm">${l.name}</b><span class="text-orange-400 text-sm">$${l.hoy}</span></div>
      <div class="text-xs text-zinc-400 mt-1">${l.city} - ${l.mqs} maqs ${getAlerta(l.ultimo)}</div>
    </div>
  `).join('');
}

function selectLoc(i){
  sel=i;
  let l=locs[i];
  document.getElementById('locName').innerText=l.name;
  document.getElementById('locInfo').innerText=`${l.city} - ${l.mqs} máquinas - Hoy: $${l.hoy} - ${getAlerta(l.ultimo)}`;
  // Maquinas de ejemplo
  let html="";
  for(let k=1;k<=l.mqs;k++){
    html+=`<div class="bg-black p-3 rounded border border-zinc-700">
      <b>RG-0${i}${k}</b> ${getAlerta(l.ultimo)}<br>
      <span class="text-xs">M1: 45 monedas $225 | M2: 12 monedas $120 | Bill $100 | Total $445</span><br>
      <div class="mt-2 flex gap-2">
        <button onclick="openConfig('RG-0${i}${k}')" class="bg-zinc-700 text-xs px-2 py-1 rounded">Configurar</button>
        <button onclick="openMove('RG-0${i}${k}')" class="bg-orange-500 text-black text-xs px-2 py-1 rounded font-bold">Mover Máquina Completa</button>
      </div>
    </div>`;
  }
  document.getElementById('machinesList').innerHTML=html;
  renderLocs();
}

function openConfig(m){document.getElementById('cfgMachine').innerText=m; document.getElementById('configModal').classList.remove('hidden');}
function closeConfig(){document.getElementById('configModal').classList.add('hidden');}
function guardarConfig(){alert('Guardado M1:$'+document.getElementById('valM1').value+' M2:$'+document.getElementById('valM2').value); closeConfig();}
function openMove(m){document.getElementById('moveMachineId').innerText=m; document.getElementById('moveModal').classList.remove('hidden');}
function closeMove(){document.getElementById('moveModal').classList.add('hidden');}
function confirmMove(){
  let destino=document.getElementById('moveDestino').value;
  if(!destino){alert('Pon destino'); return;}
  alert('¡Movimiento! '+document.getElementById('moveMachineId').innerText+' movida a '+destino);
  closeMove();
}

renderLocs();
selectLoc(0);

// grafica simple
const c=document.getElementById('chart'); const ctx=c.getContext('2d');
c.width=600; c.height=100; ctx.strokeStyle='#FF8C00'; ctx.beginPath();
ctx.moveTo(0,50); for(let i=0;i<600;i+=20){ctx.lineTo(i,50+Math.sin(i/50)*20+Math.random()*10);} ctx.stroke();
</script>
</body>
</html>
