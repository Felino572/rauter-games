<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RAUTER GAMES V2.4.1 - 187 MAQS</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{background:#000;color:#fff;font-family:monospace}</style>
</head>
<body class="p-3">
<div class="border border-orange-500 bg-zinc-900 p-2 flex justify-between text-sm">
<span class="text-orange-500 font-bold">RAUTER GAMES V2.4.1</span>
<span>187 MAQS | 143 ONLINE | $42,380 HOY</span>
</div>

<div class="flex gap-2 mt-3">
  <div id="lista" class="w-1/3"></div>
  <div class="w-2/3 bg-zinc-900 border border-zinc-800 p-4 rounded">
    <h1 id="tNom" class="text-xl font-bold text-orange-400"></h1>
    <p id="tInfo" class="text-xs text-zinc-400 mt-1"></p>
    <div id="tMaqs" class="grid grid-cols-2 gap-2 mt-4"></div>
    <canvas id="graf" width="600" height="120" class="w-full bg-black mt-6 rounded border border-zinc-800"></canvas>
  </div>
</div>

<script>
const locs=[
 {n:"Papeleria Juanita",c:"GDL",m:2,hoy:380,h:0},
 {n:"Abarrotes Lupita",c:"GDL",m:1,hoy:120,h:7},
 {n:"Farmacia San Jose",c:"GDL",m:2,hoy:200,h:13},
 {n:"Ciber Cybermax",c:"GDL",m:5,hoy:1120,h:0},
 {n:"Tendejon Don Chuy",c:"GDL",m:2,hoy:210,h:15}
];
let sel=0;
function tag(h){
 if(h>=12) return `<span class="bg-red-600 text-white px-2 py-1 rounded text-xs">🔴 APAGADA ${h}h</span>`;
 if(h>=6) return `<span class="bg-orange-500 text-black px-2 py-1 rounded text-xs">⚠️ ${h}h SIN REPORTE</span>`;
 return `<span class="bg-green-600 px-2 py-1 rounded text-xs">🟢 OK</span>`;
}
function lista(){
 document.getElementById('lista').innerHTML=locs.map((l,i)=>`
  <div onclick="ver(${i})" class="p-3 mb-2 rounded cursor-pointer border ${sel==i?'bg-orange-500/10 border-orange-500':'bg-zinc-900 border-zinc-800'}">
   <div class="flex justify-between"><b class="text-sm">${l.n}</b><span class="text-orange-400 text-xs">$${l.hoy}</span></div>
   <div class="text-xs mt-1">${l.c} - ${l.m} maqs</div>
   <div class="mt-2">${tag(l.h)}</div>
  </div>`).join('');
}
function ver(i){
 sel=i; let l=locs[i];
 document.getElementById('tNom').innerHTML=l.n+" "+tag(l.h);
 document.getElementById('tInfo').innerText=`${l.c} | ${l.m} Maquinas | Hoy $${l.hoy} | Horas sin reporte: ${l.h}h`;
 let h=""; for(let k=0;k<l.m;k++){
  h+=`<div class="bg-black p-3 rounded border border-zinc-700 text-xs">
  <b>RG-0${i}${k+47}</b> ${tag(l.h)}<br>
  M1: 45 monedas $225<br>
  M2: 12 monedas<br>
  Bill: $100<br>
  <button class="bg-zinc-800 px-2 py-1 mt-2 rounded">Configurar</button>
  <button class="bg-orange-500 text-black px-2 py-1 rounded font-bold ml-1">Mover</button>
  </div>`;
 }
 document.getElementById('tMaqs').innerHTML=h;
 lista(); graf();
}
function graf(){
 let c=document.getElementById('graf'),x=c.getContext('2d');
 x.clearRect(0,0,600,120);
 x.strokeStyle='#ff8c00'; x.lineWidth=2; x.beginPath(); x.moveTo(0,60);
 for(let i=0;i<600;i++){ x.lineTo(i,60+Math.sin(i/50)*30+Math.random()*5); }
 x.stroke();
}
lista(); ver(0);
</script>
</body>
</html>
