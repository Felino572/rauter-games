<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rauter Games - Panel Maestro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;background:#111;color:#fff;padding:20px}
button{padding:10px 20px;margin:5px;background:#00ff88;color:#000;border:none;border-radius:5px;font-weight:bold;cursor:pointer}
#lista{background:#222;padding:15px;margin-top:15px;border-radius:8px;white-space:pre-wrap}
input{padding:10px;margin:5px;border-radius:5px;border:none}
</style>
</head>
<body>
<h1>🎮 Rauter Games - Panel Maestro</h1>
<p style="color:#00ff88">Conectado a: cxocgsfcbbzstuqxvezi</p>

<input id="nombreCliente" placeholder="Nombre cliente ej: Bar La Cumbre">
<button onclick="crearCliente()">Crear Cliente</button>
<button onclick="cargarClientes()">Cargar Clientes</button>

<div id="lista">Dale a Cargar Clientes...</div>

<script>
const SUPABASE_URL = "https://cxocgsfcbbzstuqxvezi.supabase.co"
const SUPABASE_KEY = "sb_publishable_Aa3Ns7pT3kL-6Usn8a-Icw_4Q35wD7a"
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function cargarClientes(){
  document.getElementById('lista').innerText = "Cargando..."
  const { data, error } = await client.from('clientes').select('*').order('id', {ascending:false})
  if(error){
    document.getElementById('lista').innerText = "ERROR: " + error.message
    alert(error.message)
    return
  }
  if(!data || data.length===0){
    document.getElementById('lista').innerText = "0 clientes (tabla vacía)"
  } else {
    document.getElementById('lista').innerText = JSON.stringify(data, null, 2)
  }
  console.log(data)
}

async function crearCliente(){
  const nombre = document.getElementById('nombreCliente').value
  if(!nombre) return alert("Pon un nombre")
  const { error } = await client.from('clientes').insert([{nombre: nombre}])
  if(error) alert("Error: " + error.message)
  else {
    alert("Cliente creado chingón!")
    document.getElementById('nombreCliente').value = ""
    cargarClientes()
  }
}
cargarClientes()
</script>
</body>
</html>
