<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RG V2.4.1</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-black text-white p-2">
<div class="border border-orange-500/50 p-2 flex justify-between"><b class="text-orange-500">RAUTER GAMES V2.4.1</b><span>187 MAQS | 143 ONLINE | $42,380 HOY</span></div>
<div class="flex gap-2 mt-2"><div id="lista" class="w-1/3 bg-zinc-900 p-2 rounded"></div><div class="w-2/3 bg-zinc-900 p-3 rounded"><h2 id="tNom" class="text-orange-400 font-bold"></h2><p id="tInfo" class="text-xs"></p><div id="tMaqs" class="grid grid-cols-2 gap-2 mt-3"></div><canvas id="graf" class="w-full h-24 bg-black mt-4 rounded"></canvas></div></div>
<script>
const locs=[{n:"Papeleria Juanita",c:"GDL",m:2,hoy:380,h:0},{n:"Abarrotes Lupita",c:"GDL",m:1,hoy:120,h:7},{n:"Farmacia San Jose",c:"GDL",m:2,hoy:200,h:13},{n:"Ciber Cybermax",c:"GDL",m:5,hoy:1120,h:0},{n:"Tendejon Don Chuy",c:"GDL",m:2,hoy:210,h:15}];
let sel=0;
function alerta(h){if(h>=12)return`<span class="bg-red-600 px-2 rounded">🔴 APAGADA ${h}h</span>;if(h>=6)return<span class="bg-orange-500 text-black px-2 rounded">⚠️ ${h}h SIN REPORTE</span>;return<span class="bg-green-600 px-2 rounded">🟢 OK</span>`}
function pintaLista(){document.getElementById('lista').innerHTML=locs.map((l,i)=><div onclick="ver(${i})" class="p-2 mb-1 rounded cursor-pointer ${sel==i?'bg-orange-500/20 border border-orange-500':'bg-zinc-800'}"><div class="flex justify-between text-sm"><b>${l.n}</b><span class="text-orange-400">$${l.hoy}</span></div><div class="text-xs">${l.c} - ${l.m} maqs - ${alerta(l.h)}</div></div>).join('')}
function ver(i){sel=i;let l=locs[i];document.getElementById('tNom').innerHTML=l.n+" "+alerta(l.h);document.getElementById('tInfo').innerText=${l.c} - ${l.m} maquinas - Hoy $${l.hoy} - Horas sin reporte: ${l.h}h;let html="";for(let k=0;k<l.m;k++){html+=<div class="bg-black p-2 rounded border border-zinc-700 text-xs"><b>RG-0${i}${k+47}</b> ${alerta(l.h)}<br>M1: 45 monedas $225 | M2: 12 | Bill $100<br><button class="bg-zinc-800 px-2 mt-1 rounded">Configurar</button> <button class="bg-orange-500 text-black px-2 rounded font-bold">Mover Maquina</button></div>}document.getElementById('tMaqs').innerHTML=html;pintaLista();dibuja();}
function dibuja(){let c=document.getElementById('graf'),x=c.getContext('2d');c.width=600;c.height=100;x.clearRect(0,0,600,100);x.strokeStyle='#ff8c00';x.beginPath();x.moveTo(0,50);for(let i=0;i<600;i+=20){x.lineTo(i,50+Math.sin(i/40)*20)}x.stroke();}
pintaLista();ver(0);
</script></body></html>
